version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: magic_doors_postgres
    environment:
      POSTGRES_USER: magic_user
      POSTGRES_PASSWORD: magic_password
      POSTGRES_DB: dw_magic_doors
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - magic_net

  airflow:
    image: apache/airflow:2.7.1-python3.10
    container_name: magic_doors_airflow
    command: standalone
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas sqlalchemy psycopg2-binary
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - magic_net

networks:
  magic_net:
    driver: bridge

volumes:
  pgdata:
